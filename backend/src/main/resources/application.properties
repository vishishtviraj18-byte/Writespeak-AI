spring.application.name=writespeak-ai
server.port=8080

# H2 Database Config
spring.datasource.url=jdbc:h2:mem:writespeakdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Upload Limits for Images
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Tesseract OCR (set path after installing Tesseract on your system)
# Windows example: C:/Program Files/Tesseract-OCR/tessdata
# Linux example: /usr/share/tesseract-ocr/4.00/tessdata
tesseract.data.path=tessdata
tesseract.language=eng

# CORS
cors.allowed.origins=http://localhost:5173
